# .goreleaser.yml
version: 2

env:
  - GO111MODULE=on
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: nextdeploy-cli
    main: ./cli
    binary: nextdeploy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Golangcodes/nextdeploy/shared.Version={{.Version}}
      - -X github.com/Golangcodes/nextdeploy/shared/updater.Version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: nextdeploy-daemon
    main: ./daemon/cmd/nextdeployd
    binary: nextdeployd
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Golangcodes/nextdeploy/shared.Version={{.Version}}
      - -X github.com/Golangcodes/nextdeploy/shared/updater.Version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: nextdeploy-archive
    builds:
      - nextdeploy-cli
      - nextdeploy-daemon
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - sample.nextdeploy.yml

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Golangcodes
    name: nextdeploy
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## 🚀 NextDeploy {{ .Tag }}

    ### 📦 Installation

    #### Linux/macOS
    ```bash
    curl -fsSL https://nextdeploy.one/install.sh | bash

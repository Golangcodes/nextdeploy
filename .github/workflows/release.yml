name: Release Pipeline
on:
  push:
    branches: ['main']
    tags: ['v*.*.*']
jobs:
  build-and-release-local:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      # Derive the version from the git tag (falls back to "dev" on branch pushes)
      - name: Set VERSION
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev" >> "$GITHUB_ENV"
          fi

      # Multi-platform builds with version stamped in
      - name: Build Binaries
        run: make build-all

      # Create GitHub Release only when triggered by a tag push
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

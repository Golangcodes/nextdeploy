version: "2"

linters:
  disable-all: true
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - bodyclose
    - contextcheck
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # Style & Formatting
    - gofmt
    - goimports
    - misspell
    - whitespace
    - unconvert
    - predeclared

    # Complexity & Maintainability
    - cyclop
    - gocognit
    - gocyclo
    - maintidx
    - funlen

    # Security
    - gosec
    - noctx

    # Performance
    - prealloc
    - makezero

    # Best Practices
    - godot
    - gocritic
    - revive
    - exhaustive
    - wrapcheck
    - errorlint
    - nilerr

linters-settings:
  cyclop:
    max-complexity: 15
  gocognit:
    min-complexity: 20
  gocyclo:
    min-complexity: 15
  funlen:
    lines: 80
    statements: 50
  maintidx:
    under: 20
  gosec:
    excludes:
      - G304 # file path from variable - acceptable in CLI tools
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-return
      - name: error-strings
      - name: increment-decrement
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - funlen
        - gocognit
        - cyclop
    - path: magefile\.go
      linters:
        - funlen
        - gocognit
  max-issues-per-linter: 50
  max-same-issues: 10

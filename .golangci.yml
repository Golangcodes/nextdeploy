version: "2"

linters:
  default: none
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - bodyclose
    - contextcheck
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # Style
    - misspell
    - whitespace
    - unconvert
    - predeclared

    # Complexity & Maintainability
    - cyclop
    - gocognit
    - gocyclo
    - maintidx
    - funlen

    # Security
    - gosec

    # Performance
    - prealloc
    - makezero

    # Best Practices
    - godot
    - gocritic
    - revive
    - exhaustive
    - errorlint
    - nilerr

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 80
      statements: 50
    maintidx:
      under: 20
    gosec:
      excludes:
        - G304 # file path from variable - acceptable in CLI tools
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: increment-decrement
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - funlen
          - gocognit
          - cyclop
      - path: magefile\.go
        linters:
          - funlen
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
